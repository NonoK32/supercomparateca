# Override de producción: añade Traefik como reverse-proxy con HTTPS
# (Let's Encrypt) y deja de exponer los puertos de api/frontend al host.
#
# Requiere en .env: DOMAIN (dominio real apuntando al servidor) y ACME_EMAIL.
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Rutas: https://DOMAIN/        -> frontend
#        https://DOMAIN/api/... -> api (Traefik quita el prefijo /api)

services:
  reverse-proxy:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Por defecto, la CA de producción. Para ensayar sin gastar cuota, pon en
      # .env ACME_CASERVER con la de staging (ver .env.example). Al cambiar de
      # una a otra hay que borrar el volumen letsencrypt: si no, Traefik
      # reutiliza el certificado que ya tiene guardado.
      - --certificatesresolvers.le.acme.caserver=${ACME_CASERVER:-https://acme-v02.api.letsencrypt.org/directory}
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    depends_on:
      - api
      - frontend

  api:
    # No exponer al host: el tráfico entra por Traefik.
    ports: []
    environment:
      CORS_ORIGINS: https://${DOMAIN}
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.routers.api.middlewares=api-strip
      - traefik.http.middlewares.api-strip.stripprefix.prefixes=/api
      - traefik.http.services.api.loadbalancer.server.port=8000

  frontend:
    ports: []
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=le
      - traefik.http.services.frontend.loadbalancer.server.port=8080

volumes:
  letsencrypt:
