name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    name: Lint & test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, ocr-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml
      - name: Instalar dependencias
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest)
        run: pytest -q

  build:
    name: Build imagen (${{ matrix.service }})
    needs: lint-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, ocr-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (sin push; el registry/deploy llegan con la EPIC 7)
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: supercomparateca-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
