[defaults]
inventory = inventory.ini
# La verificacion de la huella del host se deja ACTIVADA: el servidor es fijo,
# y desactivarla permitiria un man-in-the-middle en cualquier conexion. El
# runbook ya hace un `ssh` manual antes de lanzar Ansible, que es donde se
# acepta la huella una vez. Si recreas el servidor: ssh-keygen -R <IP>.
retry_files_enabled = False
# El callback community.general.yaml se elimino en community.general 12.
# La forma soportada desde ansible-core 2.13 es el callback default con
# result_format=yaml.
stdout_callback = default
result_format = yaml
roles_path = roles
