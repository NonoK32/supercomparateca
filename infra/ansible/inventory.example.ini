# Copia a inventory.ini y ajusta la IP. El aprovisionamiento inicial se conecta
# como root (usuario por defecto en Hetzner); tras endurecer SSH, cambia
# ansible_user a tu deploy_user, porque root deja de poder entrar.
#
# ansible_ssh_private_key_file es necesario si tienes varias claves SSH: sin
# ella Ansible prueba las de por defecto (id_rsa...) y falla con
# "Permission denied (publickey)" aunque el ssh a mano funcione.
[web]
supercomparateca ansible_host=203.0.113.10 ansible_user=root ansible_ssh_private_key_file=~/.ssh/supercomparateca

[web:vars]
ansible_python_interpreter=/usr/bin/python3
