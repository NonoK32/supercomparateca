# Copia a inventory.ini y ajusta la IP. El aprovisionamiento inicial se conecta
# como root (usuario por defecto en Hetzner); tras endurecer SSH, usa el usuario
# de despliegue.
[web]
supercomparateca ansible_host=203.0.113.10 ansible_user=root

[web:vars]
ansible_python_interpreter=/usr/bin/python3
