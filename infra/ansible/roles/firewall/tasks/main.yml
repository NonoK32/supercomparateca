---
- name: Política por defecto - denegar tráfico entrante
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Permitir SSH, HTTP y HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "22"
    - "80"
    - "443"

- name: Activar el firewall
  community.general.ufw:
    state: enabled
