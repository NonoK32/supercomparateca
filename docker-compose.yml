# Orquestación local de SuperComparateca.
# Copia .env.example a .env antes de levantar: `cp .env.example .env`
# Uso: `docker compose up --build`
#
# El reverse-proxy (HTTPS/Let's Encrypt) se añade en la EPIC 7 (despliegue),
# donde ya hay dominio. El frontend llega en la EPIC 4bis.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ocr-service:
    build: ./services/ocr-service
    environment:
      OCR_LANG: ${OCR_LANG:-spa}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./services/api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OCR_SERVICE_URL: http://ocr-service:8001
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8090,http://127.0.0.1:8090}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./services/frontend
    ports:
      - "8090:8080"
    depends_on:
      - api

volumes:
  pgdata:
